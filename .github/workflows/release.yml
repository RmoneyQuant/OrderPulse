name: Build and Publish orderpulse Wheels

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  linux:
    name: Linux wheels
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: OrderPulse
          manylinux: 2014
          args: --release --out dist --interpreter python${{ matrix.python-version }}

      - name: Upload Linux wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.python-version }}
          path: OrderPulse/dist/*.whl

  windows:
    name: Windows wheels
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Windows wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: OrderPulse
          args: --release --out dist

      - name: Upload Windows wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: OrderPulse/dist/*.whl

  macos:
    name: macOS wheels
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build macOS wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: OrderPulse
          target: ${{ matrix.target }}
          args: --release --out dist

      - name: Upload macOS wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.python-version }}
          path: OrderPulse/dist/*.whl

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: OrderPulse
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: OrderPulse/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    steps:
      - name: Download all distributions
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect files
        run: |
          mkdir -p dist
          find artifacts -type f -name "*.whl" -exec cp {} dist/ \;
          find artifacts -type f -name "*.tar.gz" -exec cp {} dist/ \;
          ls -lh dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
